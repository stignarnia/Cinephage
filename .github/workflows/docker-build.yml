# Build and push Docker images to GitHub Container Registry
#
# Triggers:
# - Pull requests to dev: Build only (validates Docker image)
# - Push to dev: Build and push preview tags (dev, dev-YYYYMMDD-RUN)
# - Push to main: Build only validation with no image publication
# - Stable publication happens only when called from the stable release workflow with release_tag
# - Runs on pushes to main/dev, pull requests to dev, and stable release workflow calls
#
# Images are pushed to ghcr.io/<owner>/cinephage
#
# Uses native runners for each architecture to avoid slow QEMU emulation

name: Docker Build

on:
  workflow_call:
    inputs:
      release_tag:
        description: 'Semver release tag (e.g. v1.0.0)'
        required: false
        type: string
        default: ''
      checkout_ref:
        description: 'Git ref to checkout (defaults to workflow ref)'
        required: false
        type: string
        default: ''
  push:
    branches: [main, dev]
  pull_request:
    branches: [dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare Build Metadata
    runs-on: ubuntu-latest
    outputs:
      run_date: ${{ steps.meta.outputs.run_date }}
      app_version: ${{ steps.meta.outputs.app_version }}
      arch_tag_amd64: ${{ steps.meta.outputs.arch_tag_amd64 }}
      arch_tag_arm64: ${{ steps.meta.outputs.arch_tag_arm64 }}
      should_publish: ${{ steps.meta.outputs.should_publish }}

    steps:
      - name: Compute version and arch tags
        id: meta
        run: |
          RUN_DATE="$(date +%Y%m%d)"

          if [ -n "${{ inputs.release_tag }}" ]; then
            APP_VERSION="${{ inputs.release_tag }}"
            SHOULD_PUBLISH='true'
          elif [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            APP_VERSION="dev-${RUN_DATE}-${{ github.run_number }}"
            SHOULD_PUBLISH='true'
          else
            APP_VERSION="sha-${GITHUB_SHA::7}"
            SHOULD_PUBLISH='false'
          fi

          {
            echo "run_date=${RUN_DATE}"
            echo "app_version=${APP_VERSION}"
            echo "arch_tag_amd64=${APP_VERSION}-amd64"
            echo "arch_tag_arm64=${APP_VERSION}-arm64"
            echo "should_publish=${SHOULD_PUBLISH}"
          } >> "$GITHUB_OUTPUT"

  build-amd64:
    name: Build amd64
    runs-on: ubuntu-latest
    needs: [prepare]
    permissions:
      contents: read
      packages: write

    outputs:
      digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Container Registry
        if: needs.prepare.outputs.should_publish == 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build test image
        run: docker buildx build --load -t cinephage:test --build-arg APP_VERSION=${{ needs.prepare.outputs.app_version }} .

      - name: Test Docker image
        run: |
          docker run -d --name cinephage-test \
            -p 3000:3000 \
            -e ORIGIN=http://localhost:3000 \
            -e BETTER_AUTH_SECRET=ci-healthcheck-secret-change-in-production \
            cinephage:test

          for i in {1..12}; do
            if curl -sf http://localhost:3000/api/health; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for container... ($i/12)"
            sleep 5
          done

          echo "Health check failed"
          docker logs cinephage-test
          exit 1

      - name: Cleanup test container
        if: always()
        run: docker rm -f cinephage-test || true

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          platforms: linux/amd64
          push: ${{ needs.prepare.outputs.should_publish == 'true' }}
          provenance: false
          sbom: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ needs.prepare.outputs.arch_tag_amd64 }}
          build-args: |
            APP_VERSION=${{ needs.prepare.outputs.app_version }}
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64

  build-arm64:
    name: Build arm64
    runs-on: ubuntu-24.04-arm
    needs: [prepare]
    permissions:
      contents: read
      packages: write

    outputs:
      digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Container Registry
        if: needs.prepare.outputs.should_publish == 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          platforms: linux/arm64
          push: ${{ needs.prepare.outputs.should_publish == 'true' }}
          provenance: false
          sbom: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ needs.prepare.outputs.arch_tag_arm64 }}
          build-args: |
            APP_VERSION=${{ needs.prepare.outputs.app_version }}
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64

  manifest:
    name: Create Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: [prepare, build-amd64, build-arm64]
    if: needs.prepare.outputs.should_publish == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.release_tag }},enable=${{ inputs.release_tag != '' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.release_tag }},enable=${{ inputs.release_tag != '' }}
            type=semver,pattern={{major}},value=${{ inputs.release_tag }},enable=${{ inputs.release_tag != '' }}
            type=raw,value=latest,enable=${{ inputs.release_tag != '' }}
            type=raw,value=dev-${{ needs.prepare.outputs.run_date }}-${{ github.run_number }},enable=${{ github.ref == 'refs/heads/dev' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
          labels: |
            org.opencontainers.image.title=Cinephage
            org.opencontainers.image.description=Self-hosted media management application

      - name: Create and push multi-arch manifest
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          AMD64_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ needs.prepare.outputs.arch_tag_amd64 }}
          ARM64_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ needs.prepare.outputs.arch_tag_arm64 }}
        run: |
          # Create manifest for each tag
          echo "$TAGS" | while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker buildx imagetools create -t "$tag" "$AMD64_IMAGE" "$ARM64_IMAGE"
          done
