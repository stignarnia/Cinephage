---
name: GHCR Cleanup

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview only (no deletion)'
        required: true
        type: boolean
        default: true
      delete_untagged:
        description: 'Delete untagged versions'
        required: true
        type: boolean
        default: true
      keep_latest:
        description: 'Keep latest tag'
        required: true
        type: boolean
        default: true
      keep_channel_builds:
        description: 'Keep this many recent preview builds for dev plus any legacy main/edge channel tags'
        required: true
        type: string
        default: '5'
      keep_arch_tags:
        description: 'Keep legacy mutable tags amd64/arm64'
        required: true
        type: boolean
        default: true
      package_name:
        description: 'Optional package name override (e.g. cinephage or owner/cinephage)'
        required: false
        type: string
        default: ''
      confirm:
        description: 'Type DELETE to allow non-dry-run deletion'
        required: true
        type: string
        default: 'NO'

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    name: Delete non-release package versions
    runs-on: ubuntu-latest

    steps:
      - name: Validate confirmation
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          CONFIRM: ${{ github.event.inputs.confirm }}
        run: |
          if [ "$DRY_RUN" != "true" ] && [ "$CONFIRM" != "DELETE" ]; then
            echo "Refusing destructive cleanup: set confirm=DELETE when dry_run=false"
            exit 1
          fi

      - name: Resolve owner/package endpoint
        id: resolve
        env:
          INPUT_PACKAGE: ${{ github.event.inputs.package_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          API_ROOT='https://api.github.com'
          OWNER="$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          REPO="$(echo "${GITHUB_REPOSITORY##*/}" | tr '[:upper:]' '[:lower:]')"

          OWNER_INFO=$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${API_ROOT}/users/${OWNER}")
          OWNER_TYPE=$(echo "$OWNER_INFO" | jq -r '.type // "User"')

          if [ "$OWNER_TYPE" = 'Organization' ]; then
            SCOPE_PATH="orgs/${OWNER}"
          else
            SCOPE_PATH='user'
          fi

          declare -a CANDIDATES=()
          if [ -n "$INPUT_PACKAGE" ]; then
            CANDIDATES+=("$(echo "$INPUT_PACKAGE" | tr '[:upper:]' '[:lower:]')")
          fi
          CANDIDATES+=("$REPO")
          CANDIDATES+=("${OWNER}/${REPO}")

          declare -A SEEN=()
          declare -a UNIQUE_CANDIDATES=()
          for candidate in "${CANDIDATES[@]}"; do
            if [ -z "${SEEN[$candidate]+x}" ]; then
              SEEN[$candidate]=1
              UNIQUE_CANDIDATES+=("$candidate")
            fi
          done

          SELECTED_PACKAGE=''
          for candidate in "${UNIQUE_CANDIDATES[@]}"; do
            encoded=$(jq -rn --arg value "$candidate" '$value|@uri')
            probe_url="${API_ROOT}/${SCOPE_PATH}/packages/container/${encoded}/versions?per_page=1"
            probe=$(curl -sS -w '\n%{http_code}' \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "$probe_url")
            status=$(echo "$probe" | tail -n 1)
            body=$(echo "$probe" | sed '$d')

            if [ "$status" = '200' ] && echo "$body" | jq -e 'type=="array"' >/dev/null; then
              SELECTED_PACKAGE="$candidate"
              break
            fi
          done

          if [ -z "$SELECTED_PACKAGE" ]; then
            echo "Could not resolve GHCR package. Tried: ${UNIQUE_CANDIDATES[*]}"
            echo "Set package_name input explicitly and retry."
            exit 1
          fi

          PACKAGE_ENCODED=$(jq -rn --arg value "$SELECTED_PACKAGE" '$value|@uri')

          echo "scope_path=$SCOPE_PATH" >> "$GITHUB_OUTPUT"
          echo "package_name=$SELECTED_PACKAGE" >> "$GITHUB_OUTPUT"
          echo "package_encoded=$PACKAGE_ENCODED" >> "$GITHUB_OUTPUT"

          echo "Resolved package: ${SELECTED_PACKAGE}"
          echo "API scope path: ${SCOPE_PATH}"

      - name: Cleanup non-release versions
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          DELETE_UNTAGGED: ${{ github.event.inputs.delete_untagged }}
          KEEP_LATEST: ${{ github.event.inputs.keep_latest }}
          KEEP_CHANNEL_BUILDS: ${{ github.event.inputs.keep_channel_builds }}
          KEEP_ARCH_TAGS: ${{ github.event.inputs.keep_arch_tags }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCOPE_PATH: ${{ steps.resolve.outputs.scope_path }}
          PACKAGE_NAME: ${{ steps.resolve.outputs.package_name }}
          PACKAGE_ENCODED: ${{ steps.resolve.outputs.package_encoded }}
        run: |
          set -euo pipefail

          API_ROOT='https://api.github.com'
          RELEASE_TAG_REGEX='^[0-9]+(\.[0-9]+){0,2}([.-][0-9A-Za-z]+)*(\+[0-9A-Za-z.-]+)?$'
          LEGACY_RELEASE_TAG_REGEX='^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*(\+[0-9A-Za-z.-]+)?$'

          if ! [[ "$KEEP_CHANNEL_BUILDS" =~ ^[0-9]+$ ]]; then
            echo "Invalid keep_channel_builds value: ${KEEP_CHANNEL_BUILDS} (must be a non-negative integer)"
            exit 1
          fi

          should_keep_tag() {
            local tag="$1"

            if [ "$KEEP_LATEST" = 'true' ] && [ "$tag" = 'latest' ]; then
              return 0
            fi

            if [ "$KEEP_ARCH_TAGS" = 'true' ] && { [ "$tag" = 'amd64' ] || [ "$tag" = 'arm64' ]; }; then
              return 0
            fi

            if [ "$tag" = 'dev' ]; then
              return 0
            fi

            if [[ "$tag" =~ $RELEASE_TAG_REGEX ]] || [[ "$tag" =~ $LEGACY_RELEASE_TAG_REGEX ]]; then
              return 0
            fi

            return 1
          }

          page=1
          versions_json='[]'
          while true; do
            url="${API_ROOT}/${SCOPE_PATH}/packages/container/${PACKAGE_ENCODED}/versions?per_page=100&page=${page}"
            response=$(curl -sS -w '\n%{http_code}' \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "$url")
            status=$(echo "$response" | tail -n 1)
            body=$(echo "$response" | sed '$d')

            if [ "$status" != '200' ]; then
              echo "Failed to list package versions (HTTP ${status})"
              echo "$body"
              exit 1
            fi

            page_count=$(echo "$body" | jq 'length')
            versions_json=$(jq -c -s '.[0] + .[1]' <(echo "$versions_json") <(echo "$body"))

            if [ "$page_count" -lt 100 ]; then
              break
            fi
            page=$((page + 1))
          done

          total_versions=$(echo "$versions_json" | jq 'length')
          echo "Found ${total_versions} total version(s) in ${PACKAGE_NAME}"

          if [ "$total_versions" -eq 0 ]; then
            echo "No versions to process."
            exit 0
          fi

          kept=0
          candidates=0
          deleted=0
          failed=0
          legacy_edge_kept=0
          main_kept=0
          dev_kept=0

          declare -A KEEP_RECENT_TAGS=()

          if [ "$KEEP_CHANNEL_BUILDS" -gt 0 ]; then
            for channel in edge main dev; do
              mapfile -t recent_base_tags < <(echo "$versions_json" | jq -r \
                --arg channel "$channel" \
                --argjson limit "$KEEP_CHANNEL_BUILDS" '
                  [ .[]
                    | select(
                        (.metadata.container.tags // [])
                        | any(test("^" + $channel + "-[0-9]{8}-[0-9]+$"))
                      )
                  ]
                  | sort_by(.created_at)
                  | reverse
                  | .[:$limit]
                  | .[]
                  | (.metadata.container.tags // [])[]
                  | select(test("^" + $channel + "-[0-9]{8}-[0-9]+$"))
                ')

              if [ "$channel" = 'edge' ]; then
                legacy_edge_kept=${#recent_base_tags[@]}
              elif [ "$channel" = 'main' ]; then
                main_kept=${#recent_base_tags[@]}
              else
                dev_kept=${#recent_base_tags[@]}
              fi

              for base_tag in "${recent_base_tags[@]}"; do
                [ -z "$base_tag" ] && continue
                KEEP_RECENT_TAGS["$base_tag"]=1
                KEEP_RECENT_TAGS["${base_tag}-amd64"]=1
                KEEP_RECENT_TAGS["${base_tag}-arm64"]=1
              done
            done
          fi

          while IFS= read -r version; do
            id=$(echo "$version" | jq -r '.id')
            created_at=$(echo "$version" | jq -r '.created_at // "unknown"')
            mapfile -t tags < <(echo "$version" | jq -r '.metadata.container.tags[]?')

            keep_recent='false'
            for tag in "${tags[@]}"; do
              if [ -n "${KEEP_RECENT_TAGS[$tag]+x}" ]; then
                keep_recent='true'
                break
              fi
            done

            if [ "$keep_recent" = 'true' ]; then
              tag_csv=$(IFS=, ; echo "${tags[*]}")
              [ -z "$tag_csv" ] && tag_csv='<untagged>'
              kept=$((kept + 1))
              echo "Keep id=${id} created=${created_at} tags=${tag_csv} (recent channel build)"
              continue
            fi

            if [ "${#tags[@]}" -eq 0 ]; then
              if [ "$DELETE_UNTAGGED" = 'true' ]; then
                candidates=$((candidates + 1))
                if [ "$DRY_RUN" = 'true' ]; then
                  echo "[dry-run] delete id=${id} created=${created_at} tags=<untagged>"
                else
                  delete_url="${API_ROOT}/${SCOPE_PATH}/packages/container/${PACKAGE_ENCODED}/versions/${id}"
                  delete_response=$(curl -sS -w '\n%{http_code}' -X DELETE \
                    -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                    -H "Accept: application/vnd.github+json" \
                    "$delete_url")
                  delete_status=$(echo "$delete_response" | tail -n 1)
                  if [ "$delete_status" = '204' ]; then
                    deleted=$((deleted + 1))
                    echo "Deleted id=${id} created=${created_at} tags=<untagged>"
                  else
                    failed=$((failed + 1))
                    echo "Failed delete id=${id} (HTTP ${delete_status})"
                  fi
                fi
              else
                kept=$((kept + 1))
                echo "Keep id=${id} created=${created_at} tags=<untagged> (delete_untagged=false)"
              fi
              continue
            fi

            keep_version='false'
            for tag in "${tags[@]}"; do
              if should_keep_tag "$tag"; then
                keep_version='true'
                break
              fi
            done

            tag_csv=$(IFS=, ; echo "${tags[*]}")
            if [ "$keep_version" = 'true' ]; then
              kept=$((kept + 1))
              echo "Keep id=${id} created=${created_at} tags=${tag_csv}"
              continue
            fi

            candidates=$((candidates + 1))
            if [ "$DRY_RUN" = 'true' ]; then
              echo "[dry-run] delete id=${id} created=${created_at} tags=${tag_csv}"
              continue
            fi

            delete_url="${API_ROOT}/${SCOPE_PATH}/packages/container/${PACKAGE_ENCODED}/versions/${id}"
            delete_response=$(curl -sS -w '\n%{http_code}' -X DELETE \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "$delete_url")
            delete_status=$(echo "$delete_response" | tail -n 1)
            if [ "$delete_status" = '204' ]; then
              deleted=$((deleted + 1))
              echo "Deleted id=${id} created=${created_at} tags=${tag_csv}"
            else
              failed=$((failed + 1))
              echo "Failed delete id=${id} (HTTP ${delete_status})"
            fi
          done < <(echo "$versions_json" | jq -c '.[]')

          echo "---- Summary ----"
          echo "Package: ${PACKAGE_NAME}"
          echo "Dry run: ${DRY_RUN}"
          echo "Keep recent channel builds (each): ${KEEP_CHANNEL_BUILDS}"
          echo "Recent legacy edge builds protected: ${legacy_edge_kept}"
          echo "Recent main builds protected: ${main_kept}"
          echo "Recent dev builds protected: ${dev_kept}"
          echo "Total versions: ${total_versions}"
          echo "Kept: ${kept}"
          echo "Delete candidates: ${candidates}"
          echo "Deleted: ${deleted}"
          echo "Failed: ${failed}"

          {
            echo "### GHCR Cleanup Summary"
            echo ""
            echo "- Package: \`${PACKAGE_NAME}\`"
            echo "- Dry run: \`${DRY_RUN}\`"
            echo "- Keep recent channel builds (each): \`${KEEP_CHANNEL_BUILDS}\`"
            echo "- Protected recent legacy edge builds: \`${legacy_edge_kept}\`"
            echo "- Protected recent main builds: \`${main_kept}\`"
            echo "- Protected recent dev builds: \`${dev_kept}\`"
            echo "- Total versions: \`${total_versions}\`"
            echo "- Kept: \`${kept}\`"
            echo "- Delete candidates: \`${candidates}\`"
            echo "- Deleted: \`${deleted}\`"
            echo "- Failed: \`${failed}\`"
            echo ""
            echo "Kept tags:"
            echo "- Stable semver tags matching \`${RELEASE_TAG_REGEX}\` (for example: \`X\`, \`X.Y\`, \`X.Y.Z\`)"
            echo "- Legacy v-prefixed release tags matching \`${LEGACY_RELEASE_TAG_REGEX}\`"
            if [ "$KEEP_LATEST" = 'true' ]; then
              echo "- \`latest\`"
            fi
            echo "- \`dev\`"
            if [ "$KEEP_CHANNEL_BUILDS" -gt 0 ]; then
              echo "- Last \`${KEEP_CHANNEL_BUILDS}\` legacy \`edge-YYYYMMDD-run\` builds"
              echo "- Last \`${KEEP_CHANNEL_BUILDS}\` \`main-YYYYMMDD-run\` builds"
              echo "- Last \`${KEEP_CHANNEL_BUILDS}\` \`dev-YYYYMMDD-run\` builds"
            fi
            if [ "$KEEP_ARCH_TAGS" = 'true' ]; then
              echo "- \`amd64\` and \`arm64\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
