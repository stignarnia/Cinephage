name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release-tag.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Capture release tag
        id: release-tag
        if: env.RELEASE_TAG
        run: echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Publish to Cinephage API
        if: env.RELEASE_TAG
        run: |
          VERSION="${RELEASE_TAG#v}"
          COMMIT=$(git rev-parse --short=7 "$RELEASE_TAG^{commit}")

          echo "Publishing ${VERSION} (${COMMIT})"

          RESPONSE=$(curl -sS -w '\n%{http_code}' \
            -X POST "${{ secrets.CINEPHAGE_BUILD_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ secrets.CINEPHAGE_BUILD_KEY }}" \
            -d "{\"version\":\"${VERSION}\",\"commit\":\"${COMMIT}\",\"platform\":\"cinephage\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP ${HTTP_CODE}"

          if [ "$HTTP_CODE" != "201" ]; then
            echo "::error::API returned HTTP ${HTTP_CODE}, expected 201: ${BODY}"
            exit 1
          fi

          echo "Published successfully: ${BODY}"

  docker-release:
    name: Publish Stable Docker Images
    needs: [release]
    if: needs.release.outputs.release_tag != ''
    uses: ./.github/workflows/docker-build.yml
    with:
      release_tag: ${{ needs.release.outputs.release_tag }}
      checkout_ref: ${{ needs.release.outputs.release_tag }}
    secrets: inherit
