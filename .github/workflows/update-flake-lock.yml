---
name: Update Nix Flake Lock

on:
  schedule:
    - cron: '0 0 */3 * *' # Every 3 days at midnight UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-flake:
    name: Update Flake Lock
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          ref: dev

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Update flake.lock
        uses: DeterminateSystems/update-flake-lock@834c491b2ece4de0bbd00d85214bb5e83b4da5c6 # v28
        with:
          pr-title: 'chore: update flake.lock'
          base: dev
          pr-labels: |
            dependencies
            nix
            automated
          pr-body: |
            Automated update of Nix flake dependencies.

            This PR was created automatically by the update-flake-lock workflow.
          token: ${{ secrets.GITHUB_TOKEN }}
